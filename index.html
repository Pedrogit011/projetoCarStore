<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarStore</title>
</head>
<body>
  <header>
    <h3>Cadastre seu veículo para vender mais rápido</h3>
  </header> 
  <div>
    <div>
        <p>Formulário</p>
    </div>

      <div>
        <h1>Venda fácil seu carro</h1>
        <p>Descreva as características dos seu carro e marque os opicionais que ele possui</p>
        <form>
            <div>
                <label for="title">Título do Anúncio <span>*</span></label>
                <input type="text" name="title" id="title" placeholder="Um título para anunciar seu carro">
            </div>
             <div>
                <label for="preco">Preço<span>*</span></label>
                <input type="number" name="preco" id="preço" placeholder="Defina o preço">
            </div>
             <div>
                <label for="descricao">Descrição<span>*</span></label>
                <textarea name="descricao" id="descricao"placeholder="Faça a descrição do seu veículo"></textarea>
            </div>
             <div>
                <label for="modelo">Modelo<span>*</span></label>
                <input type="text" name="Modelo" id="modelo" placeholder="Modelo do veículo">
            </div>
        </form>
      </div>
  </div>  
</body>
</html>
