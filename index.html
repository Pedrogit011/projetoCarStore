<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarStore</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="cabecalho">
    <h3>Cadastre seu veículo para vender mais rápido</h3>
  </header> 
  <div class="form-container">
    <div class="form-header">
        <p>Formulário</p>
    </div>

      <div class="form-body">
        <h1 class="titulo-form">Venda fácil seu carro</h1>
        <p>Descreva as características dos seu carro e marque os opicionais que ele possui</p>
        <form onsubmit="salvarcarros(event)">
            <div class="caixaInputs">
                <label for="title">Título do Anúncio <span class="campo-obrigatorio">*</span></label>
                <input type="text" name="title" id="title" class="block" placeholder="Um título para anunciar seu carro">
            </div>

             <div class="caixaInputs">
                <label for="preco">Preço<span class="campo-obrigatorio">*</span></label>
                <input type="number" name="preco" id="preco" class="block" placeholder="Defina o preço">
            </div>

             <div class="caixaInputs">
                <label for="descricao">Descrição<span class="campo-obrigatorio">*</span></label>
                <textarea name="descricao" id="descricao" class="block" placeholder="Faça a descrição do seu veículo"></textarea>
            </div>

             <div class="caixaInputs">
                <label for="marca">Marca<span class="campo-obrigatorio">*</span></label>
                <input type="text" name="Marca" id="marca" class="block" placeholder="Coloque a Marca do Veículo">
            </div>

             <div class="caixaInputs">
                <label for="modelo">Modelo<span class="campo-obrigatorio">*</span></label>
                <input type="text" name="Modelo" id="modelo" class="block" placeholder="Modelo do veículo">
            </div>

              <div class="caixaInputs">
                <label for="Kilometragem">Kilometragem<span class="campo-obrigatorio">*</span></label>
                <input type="number" name="Kilometragem" id="Kilometragem" class="block" placeholder="Kilometragem do veículo">
            </div>

            <div class="caixaInputs">
                <label for="data-de-compra">Data de Compra<span class="campo-obrigatorio">*</span></label>
                <input type="date" name="data-de-compra" id="data-de-compra" class="block">
            </div>

            <div class="caixaInputs">
                <p>Tipo de Câmbio:<span class="campo-obrigatorio">*</span></p>
                <input type="radio" name="marcha" id="manual">
                <label for="manual">Manual</label>
                <input type="radio" name="marcha" id="auto">
                <label for="auto">Automático</label>
            </div>

            <div class="caixaOpicional"> 
                  <p>Opcionais</p>
                  <ul class="listaOpicional">
                    <li><input type="checkbox" name="opcional[]" id="airbag" value="airbag"> <label for="airbag">Airbag</label></li> 
                    <li><input type="checkbox" name="opcional[]" id="alarme" value="alarme"><label for="Alarme">Alarme</label></li>
                    <li><input type="checkbox" name="opcional[]" id="arcondicionado" value="arcondicionado"><label for="Ar Condicionado">Ar Condicionado</label></li>
                     <li><input type="checkbox" name="opcional[]" id="cameradere" value="cameradere"><label for="Camera de Ré">Camera de Ré</label></li>
                  </ul>
            </div>
             <div class="caixaOpicional">
                  <ul class="listaOpicional">
                    <li><input type="checkbox" name="opcional[]" id="assistentedepista" value="assitentedepista"> <label for="Assitente de Pista">Assitente de Pista</label></li> 
                    <li><input type="checkbox" name="opcional[]" id="partidasemchave" value="partidasemchave"><label for="Partida sem Chave">Partida sem Chave</label></li>
                    <li><input type="checkbox" name="opcional[]" id="integracaocomcelular" value="integracaocomcelular"><label for="Integração com Celular">Integração com Celular</label></li>
                     <li><input type="checkbox" name="opcional[]" id="bancodecouro" value="bancodecouro"><label for="Banco de Couro">Banco de Couro</label></li>
                  </ul>
            </div>
            <div class="CaixaInputs">
              <p>Fotos do carro <span class="campo-obrigatorio">*</span></p>
              <input type="file" name="imagem" id="imagem" multiple accept="image/png, image/jpg">
            </div>
            <input type="submit" value="Enviar" class="btn-submit">
        </form>
        <hr>
        <h2>Carros Cadastrados</h2>
        <div id="listarCarros"></div>
      </div>
  </div>  
  <script src="script/script.js"></script>
</body>
</html>
